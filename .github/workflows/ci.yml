name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy smalloldgames

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Bytecode compile
        run: uv run python -m compileall main.py smalloldgames tests

      - name: Run tests
        run: uv run python -m unittest discover -s tests -v

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_cmd: bash scripts/build_linux.sh
            artifact: dist/SmallOldGames-linux-x86_64.tar.gz
          - os: windows-latest
            build_cmd: .\scripts\build_windows.ps1
            artifact: dist/SmallOldGames-windows-x64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Build distribution
        run: ${{ matrix.build_cmd }}

      - name: Verify build artifact exists
        run: test -f "${{ matrix.artifact }}" || (echo "Build artifact not found" && exit 1)
        shell: bash

  assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Validate asset references
        run: uv run python scripts/validate_assets.py

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: uv tool install pip-audit

      - name: Audit dependencies
        run: uv run pip-audit -r <(uv pip compile pyproject.toml --quiet)
        shell: bash
        continue-on-error: true
