# Sketch Hopper balance config.
# Edit values here to tune gameplay without touching Python code.
#
# Practical rules:
# - Higher `*_min_height` delays that content until later in the run.
# - Higher `*_spawn_chance` makes that content more common.
# - Higher `*_gap_*` spreads things out more vertically.
# - Higher `min_visible_*` makes fallback spawning more aggressive.

